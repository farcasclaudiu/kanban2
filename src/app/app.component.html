<div class="container board-header">
    <h1>{{title}}</h1>
</div>
<div class="container board">
    @for (cardlist of cardlists; track cardlist.$key) {
        <div class="board-col">
            <app-cardlist [item]="cardlist"
                          [connectedDropLists]="getConnectedDropLists(cardlist.$key!)">
            </app-cardlist>
        </div>
    }
</div>
